<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Greeting QR Dashboard — Bloom Staff</title>
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/vendor/qrcode.min.js"></script>
  <style>
    :root {
      --p5: #E61A1A;
      --p5d: #A81010;
      --p5l: #FF3B3B;
      --bg: oklch(11% .06 292);
      --bg2: oklch(15% .07 292);
      --gl: rgba(255,255,255,.055);
      --glb: rgba(255,255,255,.09);
      --fb: 'DM Sans', system-ui, sans-serif;
      --fd: 'Playfair Display', Georgia, serif;
      --fc: 'Barlow Condensed', Impact, sans-serif;
      --r: 20px;
      --rs: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: #fff; font-family: var(--fb); min-height: 100dvh; }
    .dash-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
    .dash-hd { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; }
    .dash-hd h1 { font-family: var(--fd); font-size: 1.8rem; font-weight: 900; }
    .dash-hd h1 em { font-family: var(--fc); font-style: italic; color: var(--p5l); font-size: .65rem; letter-spacing: .14em; text-transform: uppercase; display: block; margin-top: 4px; }
    .dash-back { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--rs); background: var(--gl); border: 1px solid var(--glb); color: rgba(255,255,255,.7); font-size: .82rem; font-weight: 600; text-decoration: none; transition: all .2s; }
    .dash-back:hover { background: rgba(255,255,255,.1); color: #fff; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .qr-card { background: var(--gl); border: 1px solid var(--glb); border-radius: var(--r); padding: 24px; transition: border-color .3s, box-shadow .3s; position: relative; overflow: hidden; }
    .qr-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to bottom, var(--p5), #bc3194); }
    .qr-card:hover { border-color: rgba(230,26,26,.35); box-shadow: 0 12px 40px rgba(168,16,16,.2); }
    .qr-order-id { font-family: var(--fc); font-weight: 900; font-size: 1rem; letter-spacing: .06em; margin-bottom: 6px; }
    .qr-meta { font-size: .78rem; color: rgba(255,255,255,.45); margin-bottom: 16px; line-height: 1.5; }
    .qr-canvas-wrap { display: flex; align-items: center; justify-content: center; padding: 20px; background: #fff; border-radius: var(--rs); margin-bottom: 16px; min-height: 220px; }
    .qr-canvas-wrap canvas { display: block; }
    .qr-canvas-wrap img { display: block; }
    .qr-url { font-size: .68rem; color: rgba(255,255,255,.35); word-break: break-all; margin-bottom: 16px; padding: 8px 12px; background: rgba(0,0,0,.3); border-radius: 8px; font-family: monospace; }
    .qr-actions { display: flex; gap: 8px; }
    .qr-btn { flex: 1; padding: 8px 14px; border-radius: 10px; font-size: .78rem; font-weight: 700; border: none; cursor: pointer; transition: all .2s; text-align: center; }
    .qr-btn-print { background: linear-gradient(135deg, var(--p5d), var(--p5)); color: #fff; }
    .qr-btn-print:hover { box-shadow: 0 4px 16px rgba(230,26,26,.4); }
    .qr-btn-copy { background: rgba(255,255,255,.06); color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.1); }
    .qr-btn-copy:hover { background: rgba(255,255,255,.12); color: #fff; }
    .qr-video-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: .62rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 12px; }
    .qr-video-tag.has { background: rgba(0,212,170,.12); border: 1px solid rgba(0,212,170,.25); color: rgba(0,212,170,.9); }
    .qr-video-tag.none { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); color: rgba(255,255,255,.35); }
    .dash-empty { text-align: center; padding: 80px 24px; color: rgba(255,255,255,.4); font-size: .92rem; }
    .dash-empty svg { width: 48px; height: 48px; color: rgba(230,26,26,.3); margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto; }
    .dash-loading { text-align: center; padding: 80px 24px; color: rgba(255,255,255,.5); }
    .dash-loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: var(--p5); border-radius: 50%; animation: spin .8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dash-filter { display: flex; gap: 8px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .dash-filter select, .dash-filter input { background: var(--gl); border: 1px solid var(--glb); border-radius: var(--rs); padding: 8px 14px; color: #fff; font-size: .82rem; outline: none; font-family: var(--fb); }
    .dash-filter select:focus, .dash-filter input:focus { border-color: var(--p5); box-shadow: 0 0 0 3px rgba(230,26,26,.12); }
    .dash-filter select option { background: var(--bg2); }
    .dash-filter label { font-size: .72rem; color: rgba(255,255,255,.5); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
    .qr-err { color: var(--p5l); font-size: .72rem; text-align: center; padding: 8px; }
    @media print {
      body { background: #fff; color: #000; }
      .dash-hd, .dash-filter, .qr-actions, .dash-back, .qr-video-tag, .qr-url { display: none !important; }
      .qr-card { break-inside: avoid; border: 1px solid #ccc; background: #fff; page-break-inside: avoid; }
      .qr-card::before { background: #000; }
      .qr-order-id { color: #000; }
      .qr-meta { color: #666; }
    }
  </style>
</head>
<body>
  <div class="dash-wrap">
    <div class="dash-hd">
      <h1>Video Greeting QR Codes<em>Staff Dashboard · Print Ready</em></h1>
      <a href="/admin.html" class="dash-back">← Admin Panel</a>
    </div>
    <div class="dash-filter">
      <div>
        <label>Filter</label>
        <select id="filterVideo">
          <option value="all">All Orders</option>
          <option value="has">With Video</option>
          <option value="none">No Video</option>
        </select>
      </div>
      <div>
        <label>Search</label>
        <input type="text" id="filterSearch" placeholder="Order ID or QR code">
      </div>
      <button class="qr-btn qr-btn-print" id="printAllBtn" style="flex:0;">Print All</button>
    </div>
    <div id="qrGrid" class="dash-grid">
      <div class="dash-loading">Loading orders</div>
    </div>
  </div>
  <script src="/js/core/Api.js"></script>
  <script src="/js/core/Store.js"></script>
  <script src="/js/core/Auth.js"></script>
  <script>
    (function () {
      var Api = window.Api || window.__BloomApi;
      var allOrders = [];
      var qrDataUrls = {};
      async function loadOrders() {
        var grid = document.getElementById('qrGrid');
        try {
          allOrders = await Api.get('/orders?limit=100');
          if (!Array.isArray(allOrders) || !allOrders.length) {
            grid.innerHTML = '<div class="dash-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>No orders found.</div>';
            return;
          }
          renderCards(allOrders);
        } catch (e) {
          grid.innerHTML = '<div class="dash-empty">Failed to load orders. Ensure you are logged in as admin.<br><small style="color:rgba(255,255,255,.3);margin-top:8px;display:block;">' + (e.message || '') + '</small></div>';
        }
      }
      function parseRecipient(o) {
        try {
          var r = typeof o.recipient === 'string' ? JSON.parse(o.recipient) : o.recipient;
          if (r) {
            if (r.name) return r.name;
            if (r.firstName || r.lastName) return ((r.firstName || '') + ' ' + (r.lastName || '')).trim();
          }
        } catch {}
        return 'Unknown';
      }
      function renderCards(orders) {
        var grid = document.getElementById('qrGrid');
        var filter = document.getElementById('filterVideo').value;
        var search = (document.getElementById('filterSearch').value || '').trim().toLowerCase();
        var filtered = orders.filter(function (o) {
          if (filter === 'has' && !o.video_greeting) return false;
          if (filter === 'none' && o.video_greeting) return false;
          if (search) {
            var qr = (o.qr_code || o.id || '').toLowerCase();
            if (qr.indexOf(search) === -1) return false;
          }
          return true;
        });
        if (!filtered.length) {
          grid.innerHTML = '<div class="dash-empty">No matching orders.</div>';
          return;
        }
        grid.innerHTML = filtered.map(function (o, i) {
          var hasVideo = !!o.video_greeting;
          var qr = o.qr_code || o.id;
          var recipient = parseRecipient(o);
          var trackUrl = window.location.origin + '/tracking.html?id=' + encodeURIComponent(qr);
          return '<div class="qr-card" data-idx="' + i + '" data-qr="' + qr + '">' +
            '<div class="qr-order-id">' + qr + '</div>' +
            '<div class="qr-meta">Recipient: ' + recipient + '<br>Date: ' + (o.delivery_date || '\u2014') + ' \u00B7 ' + (o.delivery_slot || '\u2014') + '</div>' +
            '<span class="qr-video-tag ' + (hasVideo ? 'has' : 'none') + '">' +
              (hasVideo ? '\uD83C\uDFA5 Video Attached' : 'No Video') +
            '</span>' +
            '<div class="qr-canvas-wrap" id="qrWrap_' + i + '"></div>' +
            '<div class="qr-url">' + trackUrl + '</div>' +
            '<div class="qr-actions">' +
              '<button class="qr-btn qr-btn-print" data-action="print" data-idx="' + i + '">Print</button>' +
              '<button class="qr-btn qr-btn-copy" data-action="copy" data-url="' + trackUrl.replace(/"/g, '&quot;') + '">Copy Link</button>' +
            '</div>' +
          '</div>';
        }).join('');
        generateQRCodes(filtered);
      }
      function generateQRCodes(filtered) {
        if (!window.QRCode) {
          filtered.forEach(function (o, i) {
            var wrap = document.getElementById('qrWrap_' + i);
            if (wrap) wrap.innerHTML = '<div class="qr-err">QR library not loaded. Check network.</div>';
          });
          return;
        }
        filtered.forEach(function (o, i) {
          var wrap = document.getElementById('qrWrap_' + i);
          if (!wrap) return;
          var qr = o.qr_code || o.id;
          var trackUrl = window.location.origin + '/tracking.html?id=' + encodeURIComponent(qr);
          var canvas = document.createElement('canvas');
          wrap.innerHTML = '';
          wrap.appendChild(canvas);
          QRCode.toCanvas(canvas, trackUrl, {
            width: 180,
            margin: 2,
            color: { dark: '#1a1220', light: '#ffffff' }
          }, function (err) {
            if (err) {
              wrap.innerHTML = '<div class="qr-err">QR generation failed</div>';
              return;
            }
            try {
              qrDataUrls[i] = canvas.toDataURL('image/png');
            } catch (e) {}
          });
        });
      }
      function printSingle(idx) {
        var card = document.querySelector('[data-idx="' + idx + '"]');
        if (!card) return;
        var orderId = card.querySelector('.qr-order-id').textContent;
        var metaHtml = card.querySelector('.qr-meta').innerHTML;
        var tag = card.querySelector('.qr-video-tag');
        var tagText = tag ? tag.textContent : '';
        var hasTag = tag && tag.classList.contains('has');
        var imgSrc = qrDataUrls[idx] || '';
        if (!imgSrc) {
          var canvas = card.querySelector('canvas');
          if (canvas) {
            try { imgSrc = canvas.toDataURL('image/png'); } catch (e) {}
          }
        }
        var w = window.open('', '_blank', 'width=420,height=640');
        if (!w) return;
        var html = '<!DOCTYPE html><html><head><title>Print QR</title>' +
          '<style>' +
            'body{font-family:system-ui,sans-serif;text-align:center;padding:40px 24px;margin:0;color:#000;}' +
            '.oid{font-size:1.6rem;font-weight:900;letter-spacing:.04em;margin-bottom:10px;}' +
            '.meta{font-size:.88rem;color:#555;margin-bottom:20px;line-height:1.6;}' +
            '.tag{display:inline-block;padding:4px 12px;border-radius:6px;font-size:.72rem;font-weight:700;margin-bottom:20px;letter-spacing:.04em;text-transform:uppercase;}' +
            '.tag.has{background:#d4edda;color:#155724;border:1px solid #b1dfbb;}' +
            '.tag.none{background:#f0f0f0;color:#888;border:1px solid #ddd;}' +
            '.qr-img{margin:20px auto;}' +
            '.foot{font-size:.72rem;color:#999;margin-top:20px;}' +
          '</style></head><body>' +
          '<div class="oid">' + orderId + '</div>' +
          '<div class="meta">' + metaHtml + '</div>' +
          '<div class="tag ' + (hasTag ? 'has' : 'none') + '">' + tagText + '</div>';
        if (imgSrc) {
          html += '<div class="qr-img"><img src="' + imgSrc + '" width="220" height="220" alt="QR Code"></div>';
        } else {
          html += '<div style="padding:40px;color:#999;">QR Code unavailable</div>';
        }
        html += '<div class="foot">Scan to view greeting \u00B7 Bloom ' + new Date().getFullYear() + '</div>';
        html += '</body></html>';
        w.document.write(html);
        w.document.close();
        w.onload = function () { w.focus(); w.print(); };
      }
      function copyUrl(url) {
        navigator.clipboard.writeText(url).then(function () {
          if (window.showToast) window.showToast('Link copied', 'success');
          else alert('Copied!');
        });
      }
      document.getElementById('filterVideo').addEventListener('change', function () { renderCards(allOrders); });
      document.getElementById('filterSearch').addEventListener('input', function () { renderCards(allOrders); });
      document.getElementById('printAllBtn').addEventListener('click', function () { window.print(); });
      document.getElementById('qrGrid').addEventListener('click', function (e) {
        var btn = e.target.closest('.qr-btn');
        if (!btn) return;
        var action = btn.getAttribute('data-action');
        if (action === 'print') printSingle(btn.getAttribute('data-idx'));
        else if (action === 'copy') copyUrl(btn.getAttribute('data-url'));
      });
      loadOrders();
    })();
  </script>
</body>
</html>
