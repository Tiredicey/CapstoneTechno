<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Bloom</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/catalog.css">
</head>
<body>
<nav class="bloom-nav" id="nav">
  <a href="/" class="bloom-logo">🌸 Bloom</a>
  <ul class="bloom-nav-links">
    <li><a href="/catalog.html" style="color:#fff;">Shop</a></li>
    <li><a href="/customize.html">Create</a></li>
    <li><a href="/tracking.html">Track</a></li>
    <li><a href="/support.html">Support</a></li>
  </ul>
  <div class="bloom-nav-actions">
    <a href="/cart.html" class="btn btn-ghost btn-sm" style="position:relative;">
      🛒 Cart <span class="badge" id="cartBadge" style="display:none;">0</span>
    </a>
    <button class="btn btn-primary btn-sm" id="authBtn">Sign In</button>
  </div>
</nav>

<div class="particle-field" id="particles"></div>

<div class="catalog-page">
  <div class="container">
    <div class="catalog-header">
      <p class="tag tag-primary" style="margin-bottom:12px;">✦ Full Collection</p>
      <h1 class="section-title">Every Bloom, <span class="gradient-text">Every Occasion</span></h1>
      <p class="section-subtitle">Fresh, dried, branded, bundled — all pre-orderable with live customization.</p>
    </div>

    <div class="ai-rec-bar" id="aiRecBar">
      <h3>✨ Picked For You</h3>
      <div class="rec-scroll" id="recScroll"></div>
    </div>

    <div class="filter-bar">
      <div class="search-field">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search arrangements, occasions, styles..." id="searchInput" autocomplete="off">
      </div>
      <select class="form-input form-select" id="sortSelect" style="width:auto;border-radius:100px;">
        <option value="rating">Top Rated</option>
        <option value="price_asc">Price ↑</option>
        <option value="price_desc">Price ↓</option>
      </select>
      <select class="form-input form-select" id="tagFilter" style="width:auto;border-radius:100px;">
        <option value="">All Tags</option>
        <option value="romantic">Romantic</option>
        <option value="wedding">Wedding</option>
        <option value="birthday">Birthday</option>
        <option value="corporate">Corporate</option>
        <option value="sympathy">Sympathy</option>
        <option value="seasonal">Seasonal</option>
      </select>
    </div>

    <div class="category-tabs" id="catTabs">
      <button class="cat-tab active" data-cat="all">All</button>
      <button class="cat-tab" data-cat="bouquets">💐 Bouquets</button>
      <button class="cat-tab" data-cat="arrangements">🌸 Arrangements</button>
      <button class="cat-tab" data-cat="fresh">🌷 Fresh</button>
      <button class="cat-tab" data-cat="dried">🌿 Dried</button>
      <button class="cat-tab" data-cat="branded">🏢 Branded</button>
    </div>

    <div class="products-grid" id="productsGrid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:rgba(255,255,255,0.4);">Loading arrangements...</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div class="modal-overlay" id="productModal">
  <div class="modal" style="max-width:720px;">
    <div class="modal-header">
      <h2 style="font-family:var(--font-display);font-size:1.5rem;font-weight:700;" id="modalProductName">–</h2>
      <button class="modal-close" id="closeProductModal">✕</button>
    </div>
    <div id="modalProductBody"></div>
  </div>
</div>



<div class="toast-container" id="toastContainer"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/core/Store.js"></script>
<script src="/js/core/Api.js"></script>
<script src="/js/core/Auth.js"></script>
<script src="/js/core/Wishlist.js"></script>
<script src="/js/core/WebVitals.js"></script>
<script src="/js/core/TouchGestures.js"></script>
<script src="/js/catalog.js"></script>
</body>
</html>
