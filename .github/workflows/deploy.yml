name: Deploy Frontend to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          BACKEND="${{ vars.BACKEND_URL }}"
          if [ -z "$BACKEND" ]; then BACKEND="https://your-backend.up.railway.app"; fi
          mkdir -p public
          cat > public/env-config.js << EOF
          window.BLOOM_CONFIG = {
            API_URL: "${BACKEND}/api",
            SOCKET_URL: "${BACKEND}",
            VERSION: "${{ github.sha }}",
            DEPLOYED: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          };
          EOF
      - run: |
          REQUIRED="index.html catalog.html cart.html checkout.html customize.html support.html tracking.html profile.html confirmation.html admin.html"
          for f in $REQUIRED; do if [ ! -f "public/$f" ]; then echo "Missing: public/$f"; fi; done
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
